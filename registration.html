<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: "Poppins", "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f9fafb);
    margin: 0;
    padding: 0;
}

/* ===== Container ===== */
.container {
    width: 370px;
    background: #ffffff;
    padding: 35px 30px;
    margin: 90px auto;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    animation: fadeUp 0.9s ease;
}

/* ===== Logo ===== */
.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    width: 70px;
    animation: logoPop 1.2s ease;
}

/* ===== Brand Title ===== */
.brand-title {
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    color: #111111;
    margin-bottom: 8px;
    letter-spacing: 1.2px;
    animation: slideDown 0.8s ease;
}

/* ===== Heading ===== */
h2 {
    text-align: center;
    margin-bottom: 24px;
    color: #1f2937;
    font-weight: 500;
}

/* ===== Inputs ===== */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: #111827;
    box-shadow: 0 0 0 2px rgba(17,24,39,0.15);
}

/* ===== Button ===== */
button {
    width: 100%;
    padding: 14px;
    margin-top: 14px;
    background: linear-gradient(135deg, #111827, #374151);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}

/* ===== Links ===== */
.reg-link {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #4b5563;
}

.reg-link a {
    text-decoration: none;
    color: #111827;
    font-weight: 600;
    margin: 0 4px;
}

.reg-link a:hover {
    text-decoration: underline;
}

/* ===== Animations ===== */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes logoPop {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

    <!-- Logo -->
    <div class="logo">
        <img src="logo.png" alt="Go Buy Now Logo">
    </div>

    <!-- Brand -->
    <div class="brand-title">Go Buy Now</div>

    <h2>Register</h2>

    <form action="register.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Create Account</button>
    </form>

    <div class="reg-link">
        Already have an account?
        <a href="login.html">Login</a><br>
        GOTO <a href="menu.php">HOMEPAGE</a>
    </div>

</div>

</body>
</html>
